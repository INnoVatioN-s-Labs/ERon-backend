spring.application.name=eron

eternal-return.api.base-url=https://open-api.bser.io/v1
eternal-return.api.key=${ER_API_KEY:}
eternal-return.api.connect-timeout=3s
eternal-return.api.read-timeout=10s
eternal-return.api.user-games-cache-ttl=5m
eternal-return.api.cache-maximum-size=10000
eternal-return.api.cors-allowed-origins=http://localhost:5173
eternal-return.api.current-season-id=39
eternal-return.api.current-matching-team-mode=3
eternal-return.api.current-meta-tier=
eternal-return.api.current-meta-ranking-sample-limit=1000

management.endpoints.web.exposure.include=health,info,metrics
